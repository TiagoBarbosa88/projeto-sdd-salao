services:
  postgres:
    image: postgres:16-alpine
    container_name: salao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salao}
      POSTGRES_USER: ${POSTGRES_USER:-salao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salao_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salao} -d ${POSTGRES_DB:-salao}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
