services:
  postgres:
    image: postgres:16-alpine
    container_name: salao-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - salao

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: salao-api-prod
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
      SALAO_WHATSAPP_ENABLED: ${SALAO_WHATSAPP_ENABLED:-true}
      SALAO_WHATSAPP_PROVIDER: ${SALAO_WHATSAPP_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - salao

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: salao-web-prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - salao

networks:
  salao:

volumes:
  postgres_data:
