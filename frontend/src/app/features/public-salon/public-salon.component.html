<div class="app-view min-h-screen bg-gradient-to-b from-slate-950 via-slate-950 to-violet-950/20 pb-[4.5rem] text-slate-100 md:pb-0">
  <app-public-salon-header
    [tenant]="tenant()"
    [sections]="navSections"
    (navigate)="scrollTo($event)"
  />

  <main class="mx-auto max-w-6xl px-4 md:px-6">
    @if (loading()) {
      <p class="py-16 text-slate-400">Carregando...</p>
    } @else if (error()) {
      <section class="page-section rounded-2xl border border-slate-800 bg-slate-900/80 p-8 text-center">
        <p class="text-rose-400">{{ error() }}</p>
      </section>
    } @else if (tenant()) {
      <app-public-salon-hero
        [salonName]="tenant()!.name"
        [aboutText]="aboutText()"
        (navigate)="scrollTo($event)"
      />

      <app-public-salon-services
        [services]="services()"
        [selectedService]="selectedService()"
        (serviceSelected)="selectService($event)"
      />

      <app-public-booking-wizard
        [step]="step()"
        [selectedService]="selectedService()"
        [selectedProfessional]="selectedProfessional()"
        [selectedDate]="selectedDate()"
        [selectedSlot]="selectedSlot()"
        [confirmation]="confirmation()"
        [professionals]="professionals()"
        [professionalsLoading]="professionalsLoading()"
        [openDaysOfWeek]="openDaysOfWeek()"
        [slots]="slots()"
        [slotsLoading]="slotsLoading()"
        [slotsError]="slotsError()"
        [booking]="booking()"
        [bookingError]="bookingError()"
        (backRequested)="goBack($event)"
        (professionalSelected)="selectProfessional($event)"
        (dateSelected)="selectDate($event)"
        (slotSelected)="selectSlot($event)"
        (continueRequested)="step.set('confirm')"
        (bookingSubmitted)="confirmBooking($event)"
        (restartRequested)="restartBooking()"
        (navigate)="scrollTo($event)"
      />

      <app-public-salon-footer [tenant]="tenant()!" />
    }
  </main>

  @if (tenant()) {
    <app-public-salon-mobile-nav
      [sections]="navSections"
      [activeSection]="activeSection()"
      (navigate)="scrollTo($event)"
    />
  }
</div>
