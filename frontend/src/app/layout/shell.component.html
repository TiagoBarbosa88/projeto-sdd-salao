<div class="min-h-screen bg-slate-950">
  <aside
    class="group fixed inset-y-0 left-0 z-30 hidden w-[4.5rem] flex-col overflow-hidden border-r border-slate-800/60 bg-slate-950/80 backdrop-blur-xl transition-[width] duration-300 ease-in-out hover:w-64 md:flex">
    <nav class="flex flex-1 flex-col gap-1 overflow-y-auto px-0 pb-3 pt-4 group-hover:px-2">
      @for (item of navItems(); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="bg-violet-600/20 text-violet-200 ring-1 ring-violet-500/30"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        class="mx-auto flex h-10 w-10 items-center justify-center gap-0 rounded-xl text-slate-400 transition hover:bg-slate-800/60 hover:text-white group-hover:mx-0 group-hover:h-auto group-hover:w-full group-hover:justify-start group-hover:gap-3 group-hover:px-3 group-hover:py-2.5"
        [attr.title]="item.label">
        <span class="flex h-5 w-5 shrink-0 items-center justify-center">
          <app-nav-icon [icon]="item.icon" />
        </span>
        <span
          class="max-w-0 w-0 overflow-hidden whitespace-nowrap text-sm font-medium opacity-0 transition-all duration-200 group-hover:max-w-[12rem] group-hover:w-auto group-hover:opacity-100">
          {{ item.label }}
        </span>
      </a>
      }
    </nav>

    <div class="shrink-0 border-t border-slate-800/60 px-0 py-3 group-hover:px-2">
      <button type="button" (click)="logout()"
        class="mx-auto flex h-10 w-10 items-center justify-center gap-0 rounded-xl text-slate-400 transition hover:bg-red-500/10 hover:text-red-300 group-hover:mx-0 group-hover:h-auto group-hover:w-full group-hover:justify-start group-hover:gap-3 group-hover:px-3 group-hover:py-2.5"
        title="Sair">
        <span class="flex h-5 w-5 shrink-0 items-center justify-center">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
          </svg>
        </span>
        <span
          class="max-w-0 w-0 overflow-hidden whitespace-nowrap text-sm font-medium opacity-0 transition-all duration-200 group-hover:max-w-[12rem] group-hover:w-auto group-hover:opacity-100">
          Sair
        </span>
      </button>
    </div>
  </aside>

  <nav class="fixed inset-x-0 bottom-0 z-40 border-t border-slate-800/80 bg-slate-950/95 backdrop-blur-xl md:hidden"
    aria-label="Navegacao principal">
    <div class="flex items-stretch justify-around px-1 pt-1 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
      @for (item of navItems(); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="text-violet-300"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        class="flex min-w-0 flex-1 flex-col items-center gap-0.5 rounded-lg px-1 py-1.5 text-slate-500 transition hover:text-slate-300 [&.router-link-active]:font-medium">
        <span class="flex h-6 w-6 items-center justify-center [&_.nav-icon]:h-[1.35rem] [&_.nav-icon]:w-[1.35rem]">
          <app-nav-icon [icon]="item.icon" />
        </span>
        <span class="w-full truncate text-center text-[10px] leading-tight">{{ item.label }}</span>
      </a>
      }
    </div>
  </nav>

  <div class="min-h-screen pb-[4.5rem] md:pl-[4.5rem] md:pb-0">
    <div
      class="relative overflow-hidden border-b border-slate-800/60 bg-gradient-to-r from-slate-900 via-violet-950/40 to-slate-900 px-4 py-5 md:px-8 md:py-8">
      <div
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-violet-600/20 via-transparent to-transparent">
      </div>
      <div class="relative flex items-center gap-4 md:gap-5">
        <div
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-violet-500 to-violet-700 shadow-lg shadow-violet-900/50 ring-1 ring-violet-400/20 md:h-14 md:w-14">
          <svg class="h-6 w-6 text-white md:h-7 md:w-7" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="truncate text-xl font-bold tracking-tight text-white md:text-2xl">
            {{ pageTitle() }}
          </h1>
          @if (tenantName()) {
          <p class="mt-0.5 truncate text-sm text-slate-400">
            Bem-vindo ao
            <span class="font-medium text-violet-300">{{ tenantName() }}</span>
          </p>
          }
        </div>
      </div>
    </div>

    <main class="app-view px-4 py-4 md:px-8 md:py-8">
      <router-outlet />
    </main>
  </div>
</div>
